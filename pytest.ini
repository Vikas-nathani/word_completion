[pytest]
asyncio_mode = auto
addopts =
    --tb=short
    -q
    --cov=backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Exclude the old Solr script-style files — they need a live Solr connection
norecursedirs = scripts data htmlcov .venv .hypothesis
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
